// 在这里直接修改 true/false 来控制是否启用 NDK 和 CMake
ext {
    enableNdk = false  // 改为 false 即可禁用 NDK 和 CMake
}

android {
    namespace 'roro.stellar.manager'
    defaultConfig {
        applicationId "roro.stellar.manager"
        versionCode rootProject.ext.versionCode
        versionName rootProject.ext.versionName
        
        ndk {
            abiFilters 'arm64-v8a'//, 'armeabi-v7a', 'x86', 'x86_64'
        }

        // 根据 ext 配置条件启用 NDK
        if (enableNdk) {
            // 条件启用 CMake 构建配置
            externalNativeBuild {
                cmake {
                    arguments '-DANDROID_STL=none'
                    abiFilters 'arm64-v8a'
                }
            }
        }
    }

    buildFeatures {
        buildConfig true
        prefab true
        compose true
    }

    signingConfigs {
        sign
    }

    buildTypes {
        debug {
        	minifyEnabled true
            shrinkResources true
            proguardFiles 'proguard-rules.pro'
        }
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles 'proguard-rules.pro'
        }
    }

    // 条件启用外部 Native 构建配置
    if (enableNdk) {
        externalNativeBuild {
            cmake {
                path 'src/main/jni/CMakeLists.txt'
                version = "3.22.1+"
            }
        }
    }

    packagingOptions {
        resources {
            excludes += ['/META-INF/**']
        }
        jniLibs {
            useLegacyPackaging = true
            // 指定预编译SO库的存放位置
            pickFirsts += ['**/*.so']
        }
    }

    // 配置预编译库的源集
    sourceSets {
        main {
        	java.srcDirs = ['src/main/java']
            kotlin.srcDirs = ['src/main/kotlin']
            jniLibs.srcDirs = ['libs']
        }
    }

    kotlin {
        jvmToolchain(21)
    }
    
    applicationVariants.all { variant ->
        def processManifestTask = variant.processManifestProvider?.get()
        
        if (processManifestTask != null) {
            processManifestTask.doLast {
                // 查找最终的 AndroidManifest.xml 文件
                def manifestFile = findManifestFile(processManifestTask)
                
                if (manifestFile != null && manifestFile.exists()) {
                    try {
                        // 读取 manifest
                        def xml = new XmlParser(false, false, true).parse(manifestFile)
                        
                        // 找到 DecoyActivity
                        def decoyActivity = xml.application.'activity'.find { 
                            it.'@android:name' == 'com.cfks.badresolve.DecoyActivity' 
                        }
                        
                        if (decoyActivity != null) {
                            def intentFilter = decoyActivity.'intent-filter'[0]
                            
                            if (intentFilter != null) {
                                // 生成 5000 个 categories
                                int categoryCount = 5000
                                for (int i = 0; i < categoryCount; i++) {
                                    def category = new Node(null, "category")
                                    category.attributes().put("android:name", 
                                        "com.attacker.category.${i}")
                                    intentFilter.append(category)
                                }
                                
                                // 写回 manifest
                                manifestFile.withWriter { writer ->
                                    def printer = new XmlNodePrinter(new PrintWriter(writer))
                                    printer.preserveWhitespace = true
                                    printer.print(xml)
                                }
                                
                                println "✅ Added ${categoryCount} categories to DecoyActivity in ${manifestFile.absolutePath}"
                            } else {
                                println "⚠️ No intent-filter found for DecoyActivity"
                            }
                        } else {
                            println "ℹ️ DecoyActivity not found in manifest"
                        }
                    } catch (Exception e) {
                        println "❌ Error modifying manifest: ${e.message}"
                        e.printStackTrace()
                    }
                } else {
                    println "⚠️ Could not find AndroidManifest.xml file"
                }
            }
        }
    }
    
}

autoResConfig {
