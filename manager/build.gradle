// 在这里直接修改 true/false 来控制是否启用 NDK 和 CMake
ext {
    enableNdk = false  // 改为 false 即可禁用 NDK 和 CMake
}

android {
    namespace 'roro.stellar.manager'
    defaultConfig {
        applicationId "roro.stellar.manager"
        versionCode rootProject.ext.versionCode
        versionName rootProject.ext.versionName
        
        ndk {
            abiFilters 'arm64-v8a'//, 'armeabi-v7a', 'x86', 'x86_64'
        }

        // 根据 ext 配置条件启用 NDK
        if (enableNdk) {
            // 条件启用 CMake 构建配置
            externalNativeBuild {
                cmake {
                    arguments '-DANDROID_STL=none'
                    abiFilters 'arm64-v8a'
                }
            }
        }
    }

    buildFeatures {
        buildConfig true
        prefab true
        compose true
    }

    signingConfigs {
        sign
    }

    buildTypes {
        debug {
        	minifyEnabled true
            shrinkResources true
            proguardFiles 'proguard-rules.pro'
        }
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles 'proguard-rules.pro'
        }
    }

    // 条件启用外部 Native 构建配置
    if (enableNdk) {
        externalNativeBuild {
            cmake {
                path 'src/main/jni/CMakeLists.txt'
                version = "3.22.1+"
            }
        }
    }

    packagingOptions {
        resources {
            excludes += ['/META-INF/**']
        }
        jniLibs {
            useLegacyPackaging = true
            // 指定预编译SO库的存放位置
            pickFirsts += ['**/*.so']
        }
    }

    // 配置预编译库的源集
    sourceSets {
        main {
        	java.srcDirs = ['src/main/java']
            kotlin.srcDirs = ['src/main/kotlin']
            jniLibs.srcDirs = ['libs']
        }
    }

    kotlin {
        jvmToolchain(21)
    }
}

autoResConfig {
