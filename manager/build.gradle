// 辅助函数：查找 manifest 文件
def findManifestFile(task) {
    // 方法1：尝试直接从 outputs 获取
    try {
        // AGP 7.0+ 方式
        def manifestFile = task.manifestOutputFile
        if (manifestFile != null && manifestFile.exists()) {
            return manifestFile
        }
    } catch (Exception e) {
        // 忽略，尝试其他方法
    }
    
    // 方法2：遍历 outputs 查找
    def outputs = task.outputs?.files
    if (outputs != null) {
        for (File file : outputs) {
            if (file.isFile() && file.name == "AndroidManifest.xml") {
                return file
            }
            if (file.isDirectory()) {
                def candidate = new File(file, "AndroidManifest.xml")
                if (candidate.exists()) {
                    return candidate
                }
                // 深度搜索一级目录
                file.listFiles()?.each { subdir ->
                    if (subdir.isDirectory()) {
                        def deepCandidate = new File(subdir, "AndroidManifest.xml")
                        if (deepCandidate.exists()) {
                            return deepCandidate
                        }
                    }
                }
            }
        }
    }
    
    // 方法3：从 temporaryDir 查找
    try {
        def tempDir = task.temporaryDir
        if (tempDir != null && tempDir.exists()) {
            def candidate = new File(tempDir, "AndroidManifest.xml")
            if (candidate.exists()) {
                return candidate
            }
            // 递归查找
            def found = tempDir.listFiles()?.find { 
                it.name == "AndroidManifest.xml" || 
                (it.isDirectory() && new File(it, "AndroidManifest.xml").exists())
            }
            if (found != null && found.isDirectory()) {
                return new File(found, "AndroidManifest.xml")
            } else if (found != null && found.isFile()) {
                return found
            }
        }
    } catch (Exception e) {
        // 忽略
    }
    
    return null
}